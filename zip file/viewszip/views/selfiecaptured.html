<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Selfie Capture</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #f3cbd6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PHONE */
.phone {
  width: 360px;
  height: 740px;
  background: #ffe6ef;
  border-radius: 40px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.back {
  background: white;
  padding: 6px 10px;
  border-radius: 10px;
  margin-right: 10px;
  cursor: pointer;
}

.title {
  font-weight: bold;
}

.step {
  margin-left: auto;
  color: #ff2c8b;
  font-size: 12px;
}

/* PROGRESS */
.progress {
  height: 4px;
  background: #ffd1e3;
  border-radius: 10px;
  margin-bottom: 15px;
  position: relative;
}

.progress::after {
  content: "";
  width: 70%;
  height: 100%;
  background: #ff2c8b;
  position: absolute;
  border-radius: 10px;
}

/* TEXT */
h2 {
  font-size: 20px;
}

.sub {
  font-size: 13px;
  color: #777;
  margin-bottom: 10px;
}

/* CAMERA BOX */
.camera-box {
  position: relative;
  width: 100%;
  height: 380px;
  background: radial-gradient(circle at center, #3a0a2a, #140012);
  border-radius: 20px;
  overflow: hidden;
}

/* LIVE BADGE */
.live-badge {
  position: absolute;
  top: 15px;
  right: 15px;
  background: linear-gradient(to right, #ff4da6, #ff0077);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
}

/* FACE PLACEHOLDER */
.face {
  position: absolute;
  bottom: 40px;
  right: 50px;
  width: 110px;
  height: 150px;
  background: radial-gradient(circle, #6d2c5d, #3a0a2a);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.face::before {
  content: "";
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  position: absolute;
  top: 25px;
}

.face::after {
  content: "";
  width: 60px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  position: absolute;
  bottom: 15px;
}

/* DETECT TEXT */
.detect {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 6px 14px;
  border-radius: 15px;
  font-size: 12px;
}

/* SUCCESS TEXT */
.success {
  text-align: center;
  color: #28c76f;
  margin: 12px 0;
  font-size: 14px;
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 30px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

.retake {
  background: transparent;
  border: 1px solid #ff9cc4;
  color: #ff2c8b;
}

.confirm {
  background: linear-gradient(to right, #ff4da6, #ff0077);
  color: white;
}
</style>
</head>

<body>

<div class="phone">

  <div class="header">
    <div class="back">←</div>
    <div class="title">Live Selfie</div>
    <div class="step">Step 4 of 6</div>
  </div>

  <div class="progress"></div>

  <h2>Take Live Selfie 🤳</h2>
  <div class="sub">Align face in the pink oval. Good lighting, no masks.</div>

  <div class="camera-box">

    <div class="live-badge">📸 LIVE PHOTO</div>

    <div class="face"></div>

    <div class="detect">✔ Face detected! Capturing...</div>

  </div>

  <div class="success">💞 Selfie captured successfully</div>

  <div class="actions">
    <button class="btn retake" onclick="retake()">↩ Retake</button>
    <button class="btn confirm" onclick="confirm()">✔ Confirm 💕</button>
  </div>

</div>

<script>
function retake() {
  alert("Retaking selfie...");
}

function confirm() {
  alert("Selfie confirmed ✅");
  // window.location.href = "next-step.html";
}
</script>

</body>
</html>

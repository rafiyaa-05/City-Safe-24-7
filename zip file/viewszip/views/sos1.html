<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help is on the way</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #ffe4f3, #f8d4ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      width: 380px;
      height: 720px;
      background: #0f0a12;
      border-radius: 60px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
      border: 12px solid #1a1a1a;
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 28px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: #1a0f1f;
      color: white;
      padding: 20px 24px;
      position: relative;
      overflow-y: auto;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .hearts {
      text-align: center;
      margin: 30px 0 20px;
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .title span {
      color: #ff4d94;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #ff99cc;
      margin-bottom: 40px;
    }

    .message {
      text-align: center;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 35px;
      color: #ddd;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-left: 5px solid;
    }

    .status-card.amni {
      border-left-color: #22ff88;
    }

    .status-card.police {
      border-left-color: #ff66aa;
    }

    .status-card.location {
      border-left-color: #4488ff;
    }

    .status-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .status-desc {
      font-size: 13px;
      color: #aaa;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 40px 0 30px;
    }

    .action-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 14px;
      padding: 16px 10px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: rgba(255, 77, 148, 0.2);
      transform: scale(1.05);
    }

    .safe-btn {
      width: 100%;
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: #000;
      font-weight: 700;
      font-size: 18px;
      padding: 18px;
      border: none;
      border-radius: 50px;
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
      cursor: pointer;
      transition: all 0.3s;
    }

    .safe-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 255, 136, 0.5);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <div>07:39</div>
        <div>⋯ WiFi 🔋</div>
      </div>

      <!-- Hearts -->
      <div class="hearts">❤️❤️</div>

      <!-- Title -->
      <div class="title">Help is on<br><span>the way!</span> 🌸</div>

      <!-- Subtitle -->
      <div class="subtitle">
        Your emergency alert has been sent.<br>
        You are loved and not alone. ❤️
      </div>

      <!-- Status Cards -->
      <div class="status-card amni">
        <div class="status-title">✅ Ammi & Anjali notified</div>
        <div class="status-desc">Location shared • Calling in 30 sec</div>
      </div>

      <div class="status-card police">
        <div class="status-title">📢 AI message to Police</div>
        <div class="status-desc">Maharashtra Police 100 • FIR draft ready</div>
      </div>

      <div class="status-card location">
        <div class="status-title">📍 Location tracked</div>
        <div class="status-desc">Andheri West • Blockchain secured 🔒</div>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button class="action-btn">
          🔊<br>Loud Alarm
        </button>
        <button class="action-btn">
          🛎️<br>Silent Alert
        </button>
        <button class="action-btn">
          🎤<br>Voice Note
        </button>
      </div>

      <!-- Safe Button -->
      <button class="safe-btn" onclick="imSafe()">
        I'm Safe Now / मैं सुरक्षित हूँ
      </button>

    </div>
  </div>

  <script>
    function imSafe() {
      if (confirm("Are you really safe now?")) {
        alert("✅ Safety status updated. Thank you for letting your loved ones know.");
        
        // Optional: Change button text after click
        const btn = document.querySelector('.safe-btn');
        btn.textContent = "✅ Status Updated";
        btn.style.background = "#22ff88";
      }
    }

    // Gentle floating animation for hearts
    console.log("%c❤️ Help is on the way! ❤️", "color: #ff4d94; font-size: 16px;");
  </script>
</body>
</html>

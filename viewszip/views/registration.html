<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifazat AI Register</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  background:#f3cbd6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PHONE FRAME */
.phone{
  width:360px;
  height:720px;
  border-radius:40px;
  overflow:hidden;
  position:relative;
  background:linear-gradient(160deg,#ff6fa5,#f8a9c4,#fbd0da);
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* TOP BAR */
.top-bar{
  position:absolute;
  top:15px;
  width:100%;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* CONTENT */
.content{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  text-align:center;
  color:white;
}

/* TITLE */
h1{
  margin-bottom:20px;
}

/* INPUT */
.input-box{
  width:100%;
  margin:10px 0;
}

.input-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  outline:none;
  font-size:14px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4f87;
  font-weight:bold;
  cursor:pointer;
}

/* LINK */
.link{
  margin-top:10px;
  font-size:13px;
}

.link a{
  color:white;
  text-decoration:underline;
}

/* FLOAT SHAPES */
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
}

.big{
  width:250px;
  height:250px;
  top:-60px;
  right:-60px;
}

.small{
  width:200px;
  height:200px;
  bottom:-80px;
  left:-60px;
}
</style>
</head>

<body>

<div class="phone">

    <!-- Background -->
  <div class="circle big"></div>
  <div class="circle small"></div>

  <!-- FORM -->
  <div class="content">
    <h1>Create Account</h1>

    <div class="input-box">
      <input type="text" placeholder="Full Name">
    </div>

    <div class="input-box">
      <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Password">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Confirm Password">
    </div>

    <button class="btn" onclick="register()">Register</button>

    <div class="link">
      Already have account? 
      <a href="login.html">Login</a>
    </div>
  </div>

</div>

<script>
function register(){
  alert("Registration Successful ✅");
  window.location.href = "login.html";
}
</script>

</body>
</html>

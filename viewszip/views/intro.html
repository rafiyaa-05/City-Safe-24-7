<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifazat AI Splash</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #f3cbd6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PHONE FRAME */
.phone {
  width: 360px;
  height: 720px;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  background: linear-gradient(160deg, #ff6fa5, #f8a9c4, #fbd0da);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* TOP BAR */
.top-bar {
  position: absolute;
  top: 15px;
  width: 100%;
  padding: 0 20px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #2d2d2d;
  z-index: 2;
}

/* FLOATING SHAPES */
.circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
}

.circle.big {
  width: 250px;
  height: 250px;
  top: -60px;
  right: -60px;
}

.circle.small {
  width: 200px;
  height: 200px;
  bottom: -80px;
  left: -60px;
}

/* CENTER CONTENT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

/* ICON */
.shield {
  width: 80px;
  height: 80px;
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  margin: auto;
  position: relative;
}

.shield::after {
  content: "✔";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 30px;
}

/* TEXT */
h1 {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
}

.sub {
  font-size: 13px;
  margin-top: 5px;
  opacity: 0.9;
}

.tagline {
  margin-top: 10px;
  font-size: 14px;
}

/* DOTS */
.dots {
  margin-top: 20px;
}

.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 0 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
}

.dot.active {
  background: white;
}

/* FLOATING EMOJIS */
.emoji {
  position: absolute;
  font-size: 18px;
  opacity: 0.6;
  animation: float 4s infinite ease-in-out;
}

.e1 { top: 150px; left: 40px; }
.e2 { top: 300px; right: 40px; }
.e3 { bottom: 150px; left: 60px; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="phone">

  <!-- Background shapes -->
  <div class="circle big"></div>
  <div class="circle small"></div>

  <!-- Floating icons -->
  <div class="emoji e1">💖</div>
  <div class="emoji e2">✨</div>
  <div class="emoji e3">🌸</div>

  <!-- Center content -->
  <div class="content">
    <div class="shield"></div>

    <h1>Hifazat AI 24×7</h1>

    <div class="sub">by Womenathon Innovations</div>

    <div class="tagline">💞 Your Pink Shield of Safety</div>

    <div class="dots">
      <span class="dot"></span>
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </div>

</div>

<script>
// Auto transition to login after 3 seconds
setTimeout(() => {
  window.location.href = "login.html";
}, 3000);
</script>

</body>
</html>

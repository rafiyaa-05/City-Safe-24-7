<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Selfie – City Safe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="logo">🛡️ City Safe</a>
  <a href="otp.html">← Back</a>
  <button class="dark-btn" onclick="toggleDark()">🌙</button>
</nav>
<div class="page">
<div class="container-sm">

  <div class="step-header">
    <a href="otp.html" class="step-back">←</a>
    <div class="step-title">Live Selfie Verification</div>
    <div class="step-badge">Step 4 of 6</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span>Selfie Capture</span><span>75%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:6px;">Live Selfie 📸</h2>
    <p class="text-muted" style="font-size:14px; margin-bottom:20px;">Take a clear selfie with good lighting. Face must be visible and centered.</p>

    <div class="camera-wrap" style="max-width:100%; margin-bottom:16px;">
      <video id="camera" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
      <div class="camera-overlay"></div>
      <div id="fallback" style="display:none; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; background:#000; border-radius:16px;">📷 Camera access required</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="previewSection" style="display:none; margin-bottom:16px;">
      <img id="preview" style="width:100%; border-radius:12px; max-height:300px; object-fit:cover;" alt="Selfie preview">
    </div>

    <div id="captureSection">
      <button class="btn btn-primary btn-full btn-lg" onclick="captureSelfie()">📸 Capture Selfie</button>
    </div>

    <div id="confirmSection" style="display:none;">
      <div style="display:flex; gap:12px; margin-bottom:12px;">
        <button class="btn btn-outline" style="flex:1;" onclick="retakeSelfie()">🔄 Retake</button>
        <button class="btn btn-primary" style="flex:1;" onclick="confirmSelfie()">✔ Confirm →</button>
      </div>
    </div>

    <div class="notice mt-16">
      🔒 Encrypted & secure · Biometric match verified · Only you can see this.
    </div>

    <a href="otp.html" class="btn btn-outline btn-full mt-16">← Back</a>
  </div>

</div>
</div>
<script>
let stream = null, selfieData = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
    const video = document.getElementById("camera");
    video.srcObject = stream;
    document.getElementById("fallback").style.display = "none";
  } catch {
    document.getElementById("fallback").style.display = "flex";
  }
}

function captureSelfie() {
  const video = document.getElementById("camera");
  const canvas = document.getElementById("canvas");
  if (!video.srcObject) { alert("❌ Camera not ready"); return; }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  selfieData = canvas.toDataURL("image/jpeg");
  document.getElementById("preview").src = selfieData;
  document.getElementById("previewSection").style.display = "block";
  document.getElementById("captureSection").style.display = "none";
  document.getElementById("confirmSection").style.display = "block";
}

function retakeSelfie() {
  selfieData = null;
  document.getElementById("previewSection").style.display = "none";
  document.getElementById("captureSection").style.display = "block";
  document.getElementById("confirmSection").style.display = "none";
}

function confirmSelfie() {
  if (!selfieData) { alert("❌ No selfie captured"); return; }
  sessionStorage.setItem("volunteerSelfie", selfieData);
  if (stream) stream.getTracks().forEach(t => t.stop());
  alert("✅ Selfie confirmed!");
  window.location.href = "additional-details.html";
}

function toggleDark() { const d = document.body.classList.toggle('dark'); localStorage.setItem('dark', d?'1':'0'); document.querySelector('.dark-btn').textContent = d?'☀️':'🌙'; }
window.addEventListener('load', () => {
  if (localStorage.getItem('dark')==='1') { document.body.classList.add('dark'); document.querySelector('.dark-btn').textContent='☀️'; }
  startCamera();
});
window.addEventListener('beforeunload', () => { if (stream) stream.getTracks().forEach(t => t.stop()); });
</script>
</body>
</html>
